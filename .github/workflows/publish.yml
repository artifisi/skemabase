name: Publish skemabase-js to npm

on:
  # Trigger on version tags (e.g., v1.2.3)
  push:
    tags:
      - 'v*.*.*'
  # Allow manual runs
  workflow_dispatch:

jobs:
  publish:
    name: Publish skemabase-js
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js and authenticate to npm registry
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies and run tests
        working-directory: skemabase-js
        run: |
          npm ci
          npm test

      - name: Publish to npm
        working-directory: skemabase-js
        run: npm publish